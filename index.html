<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Par Value — Coming Soon</title>
  <meta name="description" content="A better way to buy and sell golf equipment. Coming soon." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1A1A18;
      color: #F6F5F1;
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .icon { margin-bottom: 40px; }

    .eyebrow {
      font-size: 0.6875rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      color: #35A87D;
      margin-bottom: 20px;
      text-align: center;
    }

    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(2.25rem, 5vw, 3.25rem);
      font-weight: 600;
      line-height: 1.1;
      text-align: center;
      color: #F6F5F1;
      max-width: 560px;
      margin-bottom: 20px;
    }

    h1 em { font-style: italic; color: #9C9A92; }

    .divider {
      width: 1px;
      height: 48px;
      background: #2E2E2A;
      margin: 36px auto;
    }

    p {
      font-size: 1rem;
      color: #9C9A92;
      text-align: center;
      max-width: 380px;
      line-height: 1.7;
      margin-bottom: 40px;
    }

    .notify-form {
      display: flex;
      max-width: 380px;
      width: 100%;
      border: 1px solid #2E2E2A;
      border-radius: 8px;
      overflow: hidden;
    }

    .notify-form input {
      flex: 1;
      padding: 13px 16px;
      background: #232320;
      border: none;
      color: #F6F5F1;
      font-size: 0.9375rem;
      font-family: 'Inter', sans-serif;
      outline: none;
    }

    .notify-form input::placeholder { color: #5A5955; }

    .notify-form button {
      padding: 13px 20px;
      background: #1A7F5A;
      color: #fff;
      border: none;
      font-size: 0.875rem;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      white-space: nowrap;
    }

    .notify-form button:hover { background: #14674A; }

    footer {
      position: fixed;
      bottom: 28px;
      font-size: 0.75rem;
      color: #3E3E3A;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <div class="icon">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="72" height="72">
      <rect width="256" height="256" rx="56" fill="#232320"/>
      <line x1="60" y1="128" x2="196" y2="128" stroke="#35A87D" stroke-width="6"/>
      <text x="128" y="104" text-anchor="middle" style="font-family:'Playfair Display',Georgia,serif;font-size:60px;font-weight:600;fill:#FFFFFF">P</text>
      <text x="128" y="196" text-anchor="middle" style="font-family:'Playfair Display',Georgia,serif;font-size:60px;font-weight:600;fill:#FFFFFF">V</text>
    </svg>
  </div>

  <div class="eyebrow">Coming soon</div>

  <h1>The market sets the price.<br><em>We set the standard.</em></h1>

  <div class="divider"></div>

  <p>A marketplace built for golfers who know the difference between a good deal and a great one. Par Value is on its way.</p>

  <div class="notify-form">
    <input type="email" placeholder="Your email address" />
    <button type="button">Notify me</button>
  </div>

  <footer>&copy; 2025 Par Value</footer>

</body>
</html>
